        Then advance:
        - Append `{currentStory}` to `completedStories`. Set `currentStory = null`, `reviewRetry = 0`.
        - Determine epic completion by mechanical enumeration, not impression — this check has
          previously been gotten wrong when phrased loosely, prematurely jumping to `retro` on an
          epic that still has backlog stories: list EVERY `development_status` key matching
