name: archon-bmad-story-automator
description: |
  Use when: BMAD planning is done (sprint-status.yaml exists) and you want to automate the
  implementation loop for one or more stories/epics — the same cycle the upstream
  bmad-story-automator runs, but as a native Archon workflow (no tmux, no Python).
  Triggers: "bmad implement", "automate bmad stories", "run the bmad build cycle",
            "implement epic", "bmad story automator", "build the stories".
  Does: A state-machine loop that, per story, plays one role per iteration —
        create-story -> dev-story -> (optional qa e2e test-gen) -> adversarial review (<=8 retries)
        -> commit — then fires a per-epic retrospective when every story in an epic is done.
        sprint-status.yaml is the single source of truth; the loop verifies against it,
        never trusting a session that merely "looks done."
  NOT for: Planning/spec work (use BMAD's planning agents first), bug fixes, PR reviews.

  Port of github.com/bmad-code-org/bmad-automator (MIT) onto the Archon workflow engine.
  Requires a BMAD-METHOD project with the bmad-create-story, bmad-dev-story, and
  bmad-retrospective skills installed (optionally bmad-qa-generate-e2e-tests).

provider: claude
model: sonnet  # real Claude alias; tier names (small/medium/large) require configured presets

# Isolation: this workflow runs in an Archon git WORKTREE (the engine default).
# A worktree is a fresh checkout of TRACKED files only, so BMAD's gitignored inputs are
# absent there: `_bmad/` (its config + the scripts the skills execute) and the skill roots
# `.claude/`/`.agents/`/`.codex/` (the BMAD skills themselves). The `init` node below copies
# those in from your live checkout (the main worktree) before anything else runs, so the
# `init` guard and the BMAD skills all resolve inside the worktree.
#
# The BMAD OUTPUT folder (`_bmad-output/` with sprint-status.yaml and the story files) is NOT
# copied — this workflow assumes you TRACK it in git (so it can be shared across people and
# personas), which means the worktree checks it out natively. Commit your planning output
# before running. (If you instead gitignore it, run with `--no-worktree` so the live checkout
# is used — the copy step then no-ops and everything works as before.)
#
# Per-story commits land on the worktree's branch; the final report prints how to merge or
# discard it. Use Archon's native flags to control the worktree: `--no-worktree` (run in the
# live checkout), `--branch <name>` / `--from <ref>` (name/base the worktree branch).
worktree:
  enabled: true        # run in an isolated worktree; init copies gitignored BMAD inputs in
mutates_checkout: true # writes story files, sprint-status, and commits into the worktree

nodes:
  # ─── Phase 0: Resolve the BMAD project + initialize run state ─────────
  - id: init
    bash: |
      set -euo pipefail
      ART="$ARTIFACTS_DIR"
      ROOT="$(pwd)"

      # ─── Hydrate gitignored BMAD inputs into the worktree ────────────────
      # Archon runs this workflow in a git worktree (a fresh checkout of TRACKED files).
      # BMAD's inputs are gitignored, so they're absent here: `_bmad/` (config + the scripts
      # the skills execute) and the skill roots `.claude/`/`.agents/`/`.codex/` (the skills
      # themselves). Copy them in from the main checkout so everything resolves. The main
      # checkout is always the FIRST entry of `git worktree list`. A linked worktree has a
      # `.git` FILE (a gitdir pointer); the live checkout has a `.git` DIRECTORY — that's how
      # we tell them apart (symlink-proof, unlike comparing path strings). When not in a
      # worktree (`--no-worktree`), the copy is skipped entirely. `cp -Rn` never overwrites a
      # file already in the worktree, so tracked files (e.g. a tracked `_bmad-output/`) are
      # left untouched.
      MAIN_ROOT="$(git -C "$ROOT" worktree list --porcelain 2>/dev/null | sed -n '1s/^worktree //p')"
      [ -z "$MAIN_ROOT" ] && MAIN_ROOT="$ROOT"
      IN_WORKTREE=false
      if [ -f "$ROOT/.git" ]; then
        IN_WORKTREE=true
        echo "Worktree run: hydrating gitignored BMAD inputs from $MAIN_ROOT"
        for rel in _bmad .claude .agents .codex; do
          if [ -e "$MAIN_ROOT/$rel" ]; then
            mkdir -p "$ROOT/$rel"
            cp -Rn "$MAIN_ROOT/$rel/." "$ROOT/$rel/" 2>/dev/null || true
          fi
        done

        # ─── Best-effort JS dependency install (worktrees lack gitignored node_modules) ───
        # Mirrors Archon's bundled ralph workflow: a fast, frozen (lockfile-exact) install for the
        # common JS case so the dev phase's tests can run. `|| true` keeps it best-effort despite
        # `set -euo pipefail` — a failed/again-needed install never aborts init; the dev phase
        # re-checks deps across ALL ecosystems (JS/Python/Rust/Go) and gates there. Skipped entirely
        # in the live checkout (`--no-worktree`), where deps already exist.
        if   [ -f "$ROOT/bun.lock" ] || [ -f "$ROOT/bun.lockb" ]; then
          echo "Installing JS deps (bun)...";  ( cd "$ROOT" && bun install --frozen-lockfile ) 2>&1 | tail -3 || true
        elif [ -f "$ROOT/package-lock.json" ]; then
          echo "Installing JS deps (npm)...";  ( cd "$ROOT" && npm ci ) 2>&1 | tail -3 || true
        elif [ -f "$ROOT/yarn.lock" ]; then
          echo "Installing JS deps (yarn)..."; ( cd "$ROOT" && yarn install --frozen-lockfile ) 2>&1 | tail -3 || true
        elif [ -f "$ROOT/pnpm-lock.yaml" ]; then
          echo "Installing JS deps (pnpm)..."; ( cd "$ROOT" && pnpm install --frozen-lockfile ) 2>&1 | tail -3 || true
        fi
      fi

      CONFIG="$ROOT/_bmad/bmm/config.yaml"
      if [ ! -f "$CONFIG" ]; then
        echo "ERROR: BMAD config not found at $CONFIG." >&2
        echo "This workflow must run from the root of a BMAD-METHOD project. Run 'bmad-method install' / planning first." >&2
        exit 1
      fi

      # Read paths from config. BMAD writes these with a literal {project-root}
      # placeholder (e.g. output_folder: "{project-root}/_bmad-output"), so they must
      # be expanded — not used verbatim. Prefer the explicit implementation_artifacts
      # key; fall back to output_folder + /implementation-artifacts; then the default.
      OUTPUT_RAW="$(grep -E '^[[:space:]]*output_folder:' "$CONFIG" | head -1 | sed -E 's/^[[:space:]]*output_folder:[[:space:]]*//; s/["'"'"']//g; s/[[:space:]]*$//')"
      IMPL_RAW="$(grep -E '^[[:space:]]*implementation_artifacts:' "$CONFIG" | head -1 | sed -E 's/^[[:space:]]*implementation_artifacts:[[:space:]]*//; s/["'"'"']//g; s/[[:space:]]*$//')"
      [ -z "$OUTPUT_RAW" ] && OUTPUT_RAW="_bmad-output"
      [ -z "$IMPL_RAW" ] && IMPL_RAW="$OUTPUT_RAW/implementation-artifacts"

      # Expand BMAD's {project-root} placeholder to the real repo root.
      OUTPUT_FOLDER="${OUTPUT_RAW//\{project-root\}/$ROOT}"
      IMPL="${IMPL_RAW//\{project-root\}/$ROOT}"

      # Make any still-relative paths absolute against ROOT.
      case "$OUTPUT_FOLDER" in /*) : ;; *) OUTPUT_FOLDER="$ROOT/$OUTPUT_FOLDER" ;; esac
      case "$IMPL" in /*) : ;; *) IMPL="$ROOT/$IMPL" ;; esac

      SPRINT="$IMPL/sprint-status.yaml"
      if [ ! -f "$SPRINT" ]; then
        echo "ERROR: sprint-status.yaml not found at $SPRINT." >&2
        echo "Run BMAD sprint planning before automating implementation." >&2
        exit 1
      fi

      # Detect the optional QA e2e test-generation skill across supported skill roots.
      SKIP_AUTOMATE=true
      for sr in .claude/skills .agents/skills .codex/skills; do
        if [ -f "$ROOT/$sr/bmad-qa-generate-e2e-tests/SKILL.md" ]; then
          SKIP_AUTOMATE=false
        fi
      done

      # ─── Per-story branch + stacked-PR convention detection ──────────────────────
      # If the project has adopted a repo-wide "one branch + one PR per story, stacked"
      # rule (e.g. via .agents/rules/story-branching-stacked-prs.mdc, projected to
      # .cursor/rules/ or elsewhere), this workflow switches into stacked-branching mode:
      # a new "branch" phase creates/checks out each story's own branch before create/dev,
      # and the "commit" phase pushes + opens a stacked PR. Repos WITHOUT this rule keep
      # the original single-worktree-branch behavior unchanged (STACKED_BRANCHING=false).
      RULE_FILE=""
      for rf in "$ROOT/.agents/rules/story-branching-stacked-prs.mdc" \
                "$ROOT/.cursor/rules/story-branching-stacked-prs.mdc" \
                "$ROOT/.claude/rules/story-branching-stacked-prs.mdc"; do
        if [ -f "$rf" ] || [ -L "$rf" ]; then RULE_FILE="$rf"; break; fi
      done
      STACKED_BRANCHING=false
      if [ -n "$RULE_FILE" ]; then
        STACKED_BRANCHING=true
        # Resolve through a symlink projection (e.g. .cursor/rules/... -> ../../.agents/rules/...)
        # so the loop prompt always gets the real content, not a dangling/relative link path.
        cp -L "$RULE_FILE" "$ART/branching-rule.md" 2>/dev/null || true
      fi

      # The repo's real default/integration branch (origin/HEAD, else origin/main, else
      # "main") -- distinct from this RUN's own worktree branch and from whatever branch
      # the live checkout happened to be on. This is what the FIRST story of a NEW epic
      # stacks on; every later story in that epic stacks on the previous story's branch.
      DEFAULT_BRANCH="$(git -C "$ROOT" symbolic-ref --short refs/remotes/origin/HEAD 2>/dev/null | sed 's@^origin/@@')"
      [ -z "$DEFAULT_BRANCH" ] && DEFAULT_BRANCH="main"

      # gh / gh-stack availability -- best-effort PR automation only; never required.
      GH_AVAILABLE=false
      command -v gh >/dev/null 2>&1 && GH_AVAILABLE=true
      GH_STACK_AVAILABLE=false
      if [ "$GH_AVAILABLE" = true ]; then
        gh extension list 2>/dev/null | grep -qi 'github/gh-stack' && GH_STACK_AVAILABLE=true
      fi

      # ─── Worktree branch (for the final report's integration instructions) ──────────
      # Archon runs each workflow in its own worktree on a branch it names automatically
      # (`archon/task-<workflow>-<timestamp>`), based off the repo's default branch — origin/HEAD,
      # else origin/main, else `worktree.baseBranch` in .archon/config.yaml (or override per-run with
      # `--branch`/`--from`). Capture that worktree branch plus the branch the live checkout is on, so
      # the report can show how to integrate. The detached-HEAD fallback below is just insurance —
      # Archon normally always hands us a named branch.
      BASE_BRANCH="$(git -C "$MAIN_ROOT" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")"
      WORK_BRANCH="$(git -C "$ROOT" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")"
      if [ "$IN_WORKTREE" = true ] && { [ "$WORK_BRANCH" = "HEAD" ] || [ -z "$WORK_BRANCH" ]; }; then
        SLUG="$(printf '%s' "$ARGUMENTS" | tr '[:upper:]' '[:lower:]' \
                | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//' | cut -c1-40 | sed -E 's/-+$//')"
        [ -z "$SLUG" ] && SLUG="stories"
        WORK_BRANCH="bmad/$SLUG"
        if git -C "$ROOT" show-ref --verify --quiet "refs/heads/$WORK_BRANCH"; then
          WORK_BRANCH="bmad/$SLUG-$(date +%Y%m%d-%H%M%S)"   # avoid collision with an existing branch
        fi
        if git -C "$ROOT" checkout -b "$WORK_BRANCH" >/dev/null 2>&1; then
          echo "Worktree was detached; created branch '$WORK_BRANCH' for this run's commits."
        else
          echo "WARNING: could not create a named branch in the worktree; commits stay on detached HEAD." >&2
          WORK_BRANCH="$(git -C "$ROOT" rev-parse HEAD 2>/dev/null || echo "")"
        fi
      fi

      cat > "$ART/bmad-env.json" <<EOF
      {
        "root": "$ROOT",
        "outputFolder": "$OUTPUT_FOLDER",
        "implementationArtifacts": "$IMPL",
        "sprintStatus": "$SPRINT",
        "skipAutomate": $SKIP_AUTOMATE,
        "mainRoot": "$MAIN_ROOT",
        "inWorktree": $IN_WORKTREE,
        "workBranch": "$WORK_BRANCH",
        "baseBranch": "$BASE_BRANCH",
        "stackedBranching": $STACKED_BRANCHING,
        "defaultBranch": "$DEFAULT_BRANCH",
        "ghAvailable": $GH_AVAILABLE,
        "ghStackAvailable": $GH_STACK_AVAILABLE
      }
      EOF

      cat > "$ART/state.json" <<EOF
      {
        "phase": "select",
        "currentStory": null,
        "currentEpic": null,
        "epicSlug": null,
        "currentStoryBranch": null,
        "parentStoryBranch": null,
        "reviewRetry": 0,
        "maxReviewRetries": 8,
        "createRetry": 0,
        "maxCreateRetries": 2,
        "skipAutomate": $SKIP_AUTOMATE,
        "completedStories": [],
        "completedEpics": [],
        "status": "running",
        "reason": ""
      }
      EOF

      echo "BMAD env resolved."
      echo "  sprint-status:     $SPRINT"
      echo "  artifacts dir:     $IMPL"
      echo "  skipAutomate:      $SKIP_AUTOMATE"
      echo "  stackedBranching:  $STACKED_BRANCHING (rule: ${RULE_FILE:-none found})"
      echo "  defaultBranch:     $DEFAULT_BRANCH"
      echo "  gh/gh-stack:       gh=$GH_AVAILABLE gh-stack=$GH_STACK_AVAILABLE"
    timeout: 30000

  # ─── Phase 1: The implementation loop ────────────────────────────────
  #
  # One role per iteration, driven by $ARTIFACTS_DIR/state.json. fresh_context
  # gives each role a clean session (mirrors the automator's isolated tmux
  # sessions). sprint-status.yaml is re-read every iteration as the source of
  # truth — a phase is never "done" just because the session ended.
  #
  - id: build-loop
    depends_on: [init]
    model: opus  # heaviest node: dev + adversarial review. Lower to sonnet to trade quality for cost.
    idle_timeout: 1800000
    loop:
      until: BMAD_RUN_COMPLETE
      max_iterations: 150
      fresh_context: true
      until_bash: |
        grep -qE '"status"[[:space:]]*:[[:space:]]*"(complete|failed)"' "$ARTIFACTS_DIR/state.json"
      prompt: |
        # BMAD Implementation Orchestrator — Build Loop

        You automate the BMAD implementation loop for a selected set of stories, playing
        exactly ONE role per iteration. You COORDINATE and invoke BMAD skills; you VERIFY
        progress against the real `sprint-status.yaml` — never trust a phase that merely
        "looks done." Do only the current phase, update `state.json`, then end your turn.

        ## Stories the user asked to implement
        $ARGUMENTS

        (If nothing meaningful remains in the selection, target EVERY story in sprint-status that is
        not yet `done`.)

        ## FIRST — load your state (every iteration)
        1. Read `$ARTIFACTS_DIR/bmad-env.json` → `{ root, outputFolder, implementationArtifacts, sprintStatus, skipAutomate, stackedBranching, defaultBranch, ghAvailable, ghStackAvailable }`.
        2. Read `$ARTIFACTS_DIR/state.json` → `{ phase, currentStory, currentEpic, epicSlug, currentStoryBranch, parentStoryBranch, reviewRetry, maxReviewRetries, createRetry, maxCreateRetries, status, ... }`.
        3. Read the sprint-status file at `sprintStatus`. Its `development_status` map is the
           SOURCE OF TRUTH for which stories are `done` / `in-progress` / `backlog`.

        Then act on `phase` using the matching section below. The BMAD skills live under one of
        the project skill roots (`.claude/skills`, `.agents/skills`, `.codex/skills`) and are
        auto-discovered. Invoke them by name, always in **#YOLO autonomous mode** — never wait
        for user input, never present a menu and stop. When a BMAD skill asks a question, make a
        reasonable autonomous decision from sprint-status, the story files, the PRD, and the
        architecture docs, and continue.

        Always use ABSOLUTE paths. Do not `cd` away from `root` for verification steps.

        COMMITS — only the `commit` phase ever runs `git commit`. In EVERY other phase (create, dev,
        auto, review) make your file changes but leave them UNCOMMITTED in the working tree. This is
        what lets each story land as ONE atomic commit — implementation, review fixes, the story file
        (`Status: done`), and the sprint-status `done` flip together — with no manual follow-up commit.
        Never add AI attribution to any commit: no `Co-Authored-By:` trailer, no "Generated with
        Claude Code" line, no similar credit. Commits carry only the repo's configured git user.

        ## Repo branching convention — read this before "select" routes you anywhere
        If `bmad-env.json` → `stackedBranching` is `true`, this repo has adopted a "one branch +
        one PR per story, chained as a stack" convention (never one long-lived branch carrying
        multiple stories). The full rule — read `$ARTIFACTS_DIR/branching-rule.md` if present, it
        is the repo's own canonical copy — is summarized here so every phase (including the
        inlined `review` phase, which does not go through a BMAD skill's own activation steps)
        sees it, not just `create`/`dev`:
        - Every story gets its own branch: `feat/{epicSlug}/story-{epic}.{story}`.
        - The first story in an epic branches off the repo's real default branch
          (`bmad-env.json` → `defaultBranch`). Every later story in that epic branches off the
          **previous story's own branch**, not off `defaultBranch` again — that's what makes it a
          stack.
        - Every story's branch gets its own PR: `base = ` the branch it stacked on.
        - This is implemented by a new `branch` phase (runs right before `create`/`dev` for a
          newly-selected story) and an extra push+PR step inside `commit` — both below. If
          `stackedBranching` is `false`, skip both entirely; behavior is unchanged from before this
          convention existed (single run-wide worktree branch, no PR automation).

        ---

        ## phase = "select"  — pick the next unit of work
        - Resolve the user's selection into target stories/epics. "all"/empty = all not-`done` stories.
        - Scan `development_status` in sprint order for the FIRST target story whose status is NOT `done`.
        - If a target story is found:
          - Set `currentStory` = its story key (e.g. `"2-3-user-auth"`), `reviewRetry` = 0, `createRetry` = 0.
          - If its epic number differs from the current `currentEpic`, this is a NEW epic starting:
            reset `epicSlug`, `currentStoryBranch`, `parentStoryBranch` to `null` (a new epic
            re-derives its own slug and starts its own stack fresh off `defaultBranch` — it never
            stacks on the previous epic's last branch). Set `currentEpic` = its epic number.
          - If `stackedBranching` is `true`: set `phase = "branch"` (that phase decides `create` vs
            `dev` itself once the branch switch is done).
          - Else (legacy behavior, `stackedBranching` is `false`): if a story file matching that
            key already exists in `implementationArtifacts`, set `phase = "dev"`; otherwise
            `phase = "create"`.
        - Else, check for a pending retrospective. This check is INDEPENDENT of how narrowly the
          original selection was scoped — even a single-story selection (e.g. "story 1.5") must still
          trigger its epic's retrospective once that epic becomes fully done, because the retro fires
          on epic completion, not on what the user happened to name as the target. Concretely: scan
          `development_status` for ANY epic where every one of its stories is `done` AND the epic
          itself is not already in `completedEpics` (prefer `currentEpic` first if it qualifies, since
          that's almost always the epic that was just finished).
          - If such an epic is found: set `currentEpic` = that epic, `phase = "retro"`.
        - Else (no target story pending, and every fully-done epic already has a retrospective):
          - Set `status = "complete"`, `phase = "done"`.
        Update `state.json`. End turn.

        ## phase = "branch"  — create/checkout this story's own branch, stacked on the previous one
        Only reached when `stackedBranching` is `true` (see "Repo branching convention" above).
        Never accumulate multiple stories on one branch — every story gets its own branch, chained
        as a stack, off the previous story's branch (or `defaultBranch` for an epic's first story).

        1. Resolve `epicSlug` if it is still `null` in `state.json` (cache it once resolved for
           `{currentEpic}` — do not re-derive on every later iteration of the same epic):
           - `git -C {root} branch -a --list 'feat/*/story-{currentEpic}.*'` — if any match, reuse
             the exact slug between `feat/` and `/story-` from the first one (this is how an
             in-progress epic's stack is resumed with the SAME slug it already used).
           - Else, list `{outputFolder}/specs/spec-*` (if that directory exists) and use the
             most-recently-modified entry's name with the `spec-` prefix stripped, kebab-cased.
           - Else, fall back to `project_name` from `_bmad/bmm/config.yaml`, kebab-cased.
           - Record the resolved value as `epicSlug` in `state.json`.
        2. Compute this story's branch name: `feat/{epicSlug}/story-{epic}.{story}` (dot-separated
           — confirm the exact format against any branches `git -C {root} branch -a` already shows
           for this repo before assuming; dot-separated `story-1.4` is this repo's own precedent,
           but do not hardcode it blindly against a repo with a different existing convention).
        3. Resolve `parentStoryBranch` (what this story's branch stacks on) fresh every time — do
           not trust a value cached from a previous epic:
           - `git -C {root} branch -a --list 'feat/{epicSlug}/story-{currentEpic}.*'` — if any
             match with a story number LOWER than this story's, the parent is the one with the
             HIGHEST such number (the immediately-preceding story in the stack).
           - Else (this is the first story of this epic), the parent is `defaultBranch` from
             `bmad-env.json` — NOT this run's own worktree `workBranch`, and NOT necessarily
             whatever `baseBranch` the live checkout happened to be on when the run started.
           - Record it as `parentStoryBranch` in `state.json`.
        4. Safety stash: `git -C {root} status --porcelain` — if this shows ANY uncommitted
           changes (should not happen in normal operation, since `commit` always leaves a clean
           tree, but a retrospective's doc writes or an interrupted prior run could leave some),
           stash them out first so they never bleed onto the new story's branch:
           `git -C {root} stash push -u -m "archon-bmad: pre-branch safety stash ({currentStory})"`.
           Note in your turn's summary that a stash was created so a human can review/pop it later
           — this workflow does not auto-commit unrelated leftover changes.
        5. Create/checkout this story's branch, idempotently (so a resumed/retried run that
           already created it does not fail or recreate it):
           - Best-effort `git -C {root} fetch origin {parentStoryBranch}` first (ignore failure —
             the parent may be a local-only branch this same run just created).
           - If `git -C {root} show-ref --verify --quiet refs/heads/{thisStoryBranch}` succeeds,
             `git -C {root} checkout {thisStoryBranch}`.
           - Else `git -C {root} checkout -b {thisStoryBranch} {parentStoryBranch}`.
        6. Record `currentStoryBranch` = this story's branch name in `state.json`.
        7. Set `phase` exactly as the legacy rule did: if a story file matching `{currentStory}`
           already exists in `implementationArtifacts`, `phase = "dev"`; otherwise `phase = "create"`.
        Update `state.json`. End turn.

        ## phase = "create"  → bmad-create-story
        Use the **bmad-create-story** skill to create the story file for story `{currentStory}`.
        #YOLO — do NOT wait for user input. Write the story file under `implementationArtifacts`.
        Then VERIFY: does a story file for `{currentStory}` now exist there?
        - Yes → set `phase = "dev"`.
        - No  → increment `createRetry`. If `createRetry < maxCreateRetries`, keep `phase = "create"`;
                else set `status = "failed"`, `phase = "done"`, `reason = "create-story failed for {currentStory}"`.
        Update `state.json`. End turn.

        ## phase = "dev"  → bmad-dev-story
        FIRST, ensure build dependencies are present. A worktree run starts WITHOUT the project's
        gitignored deps (`node_modules/`, virtualenvs, …), so tests would fail spuriously. Inspect
        `{root}` for lock/config files and run the matching install from `{root}` (absolute paths, do
        NOT `cd` elsewhere for verification):
          - `package.json` + `bun.lock`/`bun.lockb` → `bun install`; + `package-lock.json` → `npm install`;
            + `yarn.lock` → `yarn install`; + `pnpm-lock.yaml` → `pnpm install`
          - `requirements.txt` → `pip install -r requirements.txt`; `pyproject.toml` + `poetry.lock` → `poetry install`
          - `Cargo.toml` → `cargo build`; `go.mod` → `go mod download`
        (`init` already best-effort-installs the JS case, so re-running it is cheap and idempotent; on a
        `--no-worktree` run the deps already exist and this is a no-op.) If the install genuinely fails
        (network, private registry, missing toolchain), record it in the story's Dev Agent Record and do
        NOT mark tasks `[x]` on the basis of tests that could not actually run — leave them for the
        review gate to catch.

        Then use the **bmad-dev-story** skill to implement story `{currentStory}`.
        Implement ALL tasks marked `[ ]`. Run the tests. Update the task checkboxes and the
        story's Dev Agent Record / File List. Let the skill update sprint-status. #YOLO — autonomous.
        Then set `phase = "auto"` if `skipAutomate` is false, otherwise `phase = "review"`.
        Update `state.json`. End turn.

        ## phase = "auto"  → bmad-qa-generate-e2e-tests (optional)
        Use the **bmad-qa-generate-e2e-tests** skill for story `{currentStory}`.
        Auto-apply all discovered gaps in tests. #YOLO. (If `skipAutomate` is true you should not
        be here — just set `phase = "review"`.)
        Then set `phase = "review"`. Update `state.json`. End turn.

        ## phase = "review"  → adversarial code review (INLINE — do NOT call an external skill)
        🔥 You are an ADVERSARIAL code reviewer. Your purpose: validate the story file's CLAIMS
        against the ACTUAL implementation and git reality. Find what is wrong or missing. Do not
        write lazy "looks good" reviews. Exclude `_bmad/`, `_bmad-output/`, and IDE/CLI config
        dirs (`.cursor/`, `.windsurf/`, etc.) from review — only review application source code.

        1. Read the COMPLETE story file for `{currentStory}` (in `implementationArtifacts`).
           Parse: Story, Acceptance Criteria, Tasks/Subtasks (with `[x]`/`[ ]`), Dev Agent Record → File List.
        2. Discover real changes via git (absolute paths, no `cd`):
           `git -C {root} status --porcelain`, `git -C {root} diff --name-only`, `git -C {root} diff --cached --name-only`.
           Cross-check the story's File List against git reality:
             - file changed in git but absent from File List → MEDIUM
             - file claimed in File List but no git change → HIGH (false claim)
        3. For EACH Acceptance Criterion: search the implementation for evidence.
           IMPLEMENTED / PARTIAL / MISSING. PARTIAL or MISSING → HIGH.
        4. For EACH task marked `[x]`: verify it was actually done. Marked done but NOT done → CRITICAL.
        5. Code quality pass on the changed files: security (injection, missing validation, auth),
           error handling, performance (N+1, hot loops), and TEST QUALITY (real assertions vs placeholders).
        6. AUTO-FIX all CRITICAL, HIGH, and MEDIUM findings directly in the code. Add/adjust tests.
           Re-run the tests to confirm green. Update the story's File List and Dev Agent Record with
           what you fixed.

        Outcome (CRITICAL and HIGH issues gate — MEDIUM/LOW are fixed where practical but never blocking):
        - **0 CRITICAL and 0 HIGH remain after fixes** → set the story file `Status: done`, sync
          `development_status[{currentStory}] = done` in sprint-status.yaml (preserve all comments
          and structure), set `phase = "commit"`.
        - **1+ CRITICAL or 1+ HIGH remain** → sync `development_status[{currentStory}] = in-progress`,
          increment `reviewRetry`.
            - `reviewRetry < maxReviewRetries` → keep `phase = "review"` (re-attack + fix next iteration).
            - `reviewRetry >= maxReviewRetries` → `status = "failed"`, `phase = "done"`,
              `reason = "story {currentStory} failed review after {maxReviewRetries} cycles"`.
        Update `state.json`. End turn.

        ## phase = "commit"
        This is the ONLY place the story's work is committed. Produce ONE atomic commit that already
        contains the `done` state, so no manual follow-up commit is ever needed.

        1. RE-ASSERT completion immediately before staging (a fresh-context earlier phase may have
           left sprint-status in a non-final state):
           - Re-read sprint-status.yaml. If `development_status[{currentStory}]` is anything other
             than `done`, set it to `done` now (preserve all comments and structure).
           - Ensure the story file for `{currentStory}` has `Status: done`.
        2. Stage everything, then commit once (absolute paths, no `cd`):
             `git -C {root} add -A`
           If `git -C {root} status --porcelain` is empty, skip the commit (nothing to do).
           Otherwise commit with a descriptive Conventional Commits message you write from the story —
           subject `feat({currentStory}): <concise summary>`, plus a short body of the key changes and
           the test result:
             `git -C {root} commit -F <message-file> || true`
           The commit message must contain NO AI attribution — do NOT add a `Co-Authored-By:` trailer
           (Claude or otherwise), a "Generated with Claude Code" line, or any similar credit. Author
           and committer stay as the repo's configured git user only.
           The single commit MUST contain, together: the implementation, any review fixes, the updated
           story file (`Status: done`), AND sprint-status.yaml (`development_status[{currentStory}] =
           done`). Never split the `done` flip into a separate commit.
        3. If `stackedBranching` is `true`, push this story's branch and open its stacked PR.
           Best-effort only in the sense that a genuine push/PR failure (`gh` missing, offline, no
           permission) must NEVER fail the story or the run — log a warning and continue to "Then
           advance" below regardless. It is NOT best-effort in the sense of accepting a wrong base:
           getting the base branch wrong silently defeats the entire point of a stacked PR, so treat
           a wrong-base PR as a bug to prevent, not an acceptable shortcut.

           - Push: `git -C {root} push -u origin {currentStoryBranch}`.
           - **Resolve `<owner>/<repo>` by parsing `git -C {root} remote get-url origin` yourself**
             (strip the host and `.git` suffix from the URL to get `<owner>/<repo>`) and pass it
             explicitly as `--repo <owner>/<repo>` to every `gh` call below. Do **not** rely on `gh`'s
             own implicit repo resolution (bare `gh pr create`/`gh pr list` with no `--repo`, or
             `gh api repos/:owner/:repo`) — when a repo has both an `origin` (your fork/working repo)
             and an `upstream` remote configured, that implicit resolution can silently pick
             `upstream` instead of `origin`, which then makes `parentStoryBranch` (which only exists
             on `origin`) look like it doesn't exist on "the repo" at all. That false negative is
             exactly the kind of bug that produces a PR silently opened against the wrong base — if a
             remote-branch-existence check ever comes back negative, double check it was actually run
             against `<owner>/<repo>` parsed from `origin`, not gh's default, before trusting a "not
             found" result.
           - Idempotency check first (a resumed/retried run may have already opened this story's PR):
             `gh pr list --repo <owner>/<repo> --head {currentStoryBranch} --json number,url`. If a
             PR already exists, skip straight to recording it (do not create a second one) — but if
             its `baseRefName` is wrong (not `{parentStoryBranch}`), fix it with `gh pr edit
             --repo <owner>/<repo> <number> --base {parentStoryBranch}` before moving on; do not leave
             a known-wrong base in place just because *a* PR exists.
           - Else, if `ghStackAvailable` is `true`, actually attempt the native path first — do not
             skip straight to the manual fallback just because it seems simpler:
             `gh stack init {parentStoryBranch} {currentStoryBranch}` (adopts both branches into a
             stack; safe to re-run — ignore a failure that indicates they're already adopted) then
             `gh stack submit --auto --open`. Only fall through to the manual command below if this
             genuinely fails for a structural reason (e.g. the extension errors that stacked PRs
             aren't enabled for this repo/host) — not merely because an earlier, wrongly-scoped
             remote-branch check made `{parentStoryBranch}` look unavailable.
           - Manual fallback (also the only path when `ghAvailable` is `true` but `ghStackAvailable`
             is `false`, or `gh stack` genuinely doesn't work on this host): create explicitly against
             the resolved repo and the resolved parent branch — never omit `--base`, and never
             substitute `defaultBranch`/`main` for `{parentStoryBranch}` unless this really is the
             first story of the epic (`parentStoryBranch == defaultBranch` in that case, which is
             correct, not a fallback):
             `gh pr create --repo <owner>/<repo> --base {parentStoryBranch} --head
             {currentStoryBranch} --title "<story title from the story file>" --body "<short summary
             + link to the story file path>"`.
           - If `ghAvailable` is `false`, skip PR creation entirely and just note in your turn's
             summary that the branch was pushed (if it was) and a PR needs opening manually with
             `--base {parentStoryBranch}`.
           - Record whatever PR number/URL resulted (or that none could be created) — mention it in
             your turn's summary so the final `report` node can surface it; do not create a second
             commit just to persist this.
        Then advance:
        - Append `{currentStory}` to `completedStories`. Set `currentStory = null`, `reviewRetry = 0`.
        - Re-read sprint-status: are ALL stories in `{currentEpic}` now `done`?
            - Yes AND `{currentEpic}` not in `completedEpics` → set `phase = "retro"` (keep `currentEpic`).
            - Otherwise → set `phase = "select"`.
        Update `state.json`. End turn.

        ## phase = "retro"  → bmad-retrospective (per epic, NON-BLOCKING)
        Use the **bmad-retrospective** skill for epic `{currentEpic}`, in #YOLO mode. Assume NO user
        input. For every prompt that expects input, decide autonomously from sprint-status, the
        story files and their dev notes, the previous retrospective (if any), and the architecture/PRD.
        Auto-confirm the epic number from sprint-status; synthesize observations from the story analysis;
        make data-driven decisions; pick the most appropriate menu option; skip all "WAIT for user" steps.

        After the retrospective creates its documents, verify implementation-learning doc updates:
          1. List docs that may need updates (architecture decisions, API docs, READMEs, config docs).
          2. For each, read the current content and compare against the ACTUAL implementation code.
          3. Update only docs with verified discrepancies; discard proposed updates where code matches docs.

        This phase is NON-BLOCKING: if the retrospective errors for any reason, log it and continue —
        never fail the run for a retro. When done (or on error):
        - **Commit the retrospective's own file writes now** — do not defer this to the `commit`
          phase, which may never run again in this session (there may be no further story left to
          trigger it). If `git -C {root} status --porcelain` is non-empty: `git -C {root} add -A`
          then commit with subject `docs: Epic {currentEpic} retrospective` and a short body listing
          the action items. If `stackedBranching` is `true`, best-effort push it to the current
          branch (`git -C {root} push -u origin {currentStoryBranch}` if `{currentStoryBranch}` is
          still set from the epic's last story) so the retro doc isn't left stranded only in the
          local worktree.
        - Append `{currentEpic}` to `completedEpics`. Set `currentEpic = null`, `phase = "select"`.
        Update `state.json`. End turn.

        ---

        ## COMPLETION
        After updating `state.json`, check `status`:
        - `status == "complete"` → output exactly: <promise>BMAD_RUN_COMPLETE</promise>
        - `status == "failed"`   → output exactly: <promise>BMAD_RUN_COMPLETE</promise>
        - otherwise → do NOT output any completion signal. Just end your turn; the loop continues.

  # ─── Phase 2: Report ─────────────────────────────────────────────────
  - id: report
    depends_on: [build-loop]
    trigger_rule: all_done
    context: fresh
    model: haiku  # cheap final summary
    prompt: |
      Generate a concise run report for this BMAD implementation run.

      Read:
      1. `$ARTIFACTS_DIR/state.json` — final status (`complete`/`failed`), completedStories, completedEpics, reason, `stackedBranching`, `epicSlug`.
      2. `$ARTIFACTS_DIR/bmad-env.json` — sprint-status path, and `mainRoot` / `inWorktree` / `workBranch` / `baseBranch` / `stackedBranching` / `ghAvailable`.
      3. The sprint-status file (from bmad-env.json) — final per-story status.
      4. `git -C <root> log --oneline -30` — the commits this run produced (root = the worktree).

      Report:
      ### Outcome
      - Final status, and (if failed) the escalation reason verbatim.
      ### Stories
      - Table of each targeted story: final sprint-status, and whether it was committed this run.
      ### Epics & Retrospectives
      - Which epics completed and which had a retrospective run.
      ### Next steps
      <check if="stackedBranching is true (from bmad-env.json), instead of the single-worktree-branch section below">
      - This run used the repo's stacked-branch-per-story convention — no single `{workBranch}` holds
        the work. Find each story's own branch and PR:
          # list this epic's story branches (each one a separate, already-pushed stack rung):
          `git -C <root> branch -a --list 'feat/{epicSlug}/story-*'`
          # if gh is available, list the PRs actually opened this run:
          `gh pr list --repo <owner>/<repo> --head <each-story-branch> --json number,url,baseRefName`
        List each completed story's branch name, its base (the branch it stacked on), and its PR
        URL/number if one exists (or "not opened — <reason>" if `ghAvailable` was false or PR
        creation failed and was only logged). Note explicitly that these branches were pushed
        directly to `origin` from the Archon worktree — nothing further to merge/integrate through
        the worktree itself; the PRs are the integration path (review + merge each rung of the stack
        in order, oldest story first). Still mention worktree teardown once all its PRs are merged:
          `archon complete {workBranch}` (`--force` only if you intend to discard rather than keep
          the now-merged branches around for reference).
      </check>
      <check if="stackedBranching is false/absent — the ORIGINAL single-branch behavior">
      - If `inWorktree` is true: this run happened in an isolated Archon worktree at `{root}`, on branch
        `{workBranch}`. Your live checkout was never touched (still on `{baseBranch}`), and Archon does
        NOT auto-merge or auto-remove the worktree — it persists until you integrate and tear it down.
        Give these exact commands:
          # 1. Review what landed (branch refs are shared across worktrees):
          `git -C {mainRoot} log --oneline {baseBranch}..{workBranch}`
          # 2. Integrate — EITHER merge locally:
          `git -C {mainRoot} merge --no-ff {workBranch}`
          #    OR push the branch and open a PR:
          `git -C {root} push -u origin {workBranch}`
          # 3. Tear down the worktree + delete the branch once it's merged/pushed
          #    (`archon complete` refuses on unmerged/unpushed/uncommitted work unless --force):
          `archon complete {workBranch}`
        To resume more stories in the SAME worktree (BMAD inputs already hydrated there):
          `archon continue {workBranch} --workflow archon-bmad-story-automator "<more stories>"`
        To discard the run entirely: `archon complete {workBranch} --force` (removes worktree + branch),
        or `archon isolation cleanup --merged` to bulk-clean already-merged runs later.
      - If `inWorktree` is false (ran with `--no-worktree`): commits landed on `{baseBranch}` in your
        live checkout directly — no merge or cleanup step needed.
      </check>
      - Any stories left `in-progress` or `failed` that need a human.

      Write the report to `$ARTIFACTS_DIR/report.md` AND output it directly so the user sees it.
    allowed_tools: [Read, Bash, Glob, Grep, Write]
