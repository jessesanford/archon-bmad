        Update `state.json`. End turn.

        ## phase = "rebase_cascade"  → step 1/4 of per-epic validation: refresh the stack against upstream
        Entered whenever `currentValidationEpic` is set — either right after that epic's
        retrospective lands (see the `retro` phase's ending), as `select`'s catch-all safety net
        for a run where no NEW retrospective fired this run (a defect-fix pass, for example) but the
        highest fully-done epic still isn't in `epicsValidated`, or as the loop-back target from
        `auto_correct_course` after it commits a fix to one or more story branches (in which case
        `currentValidationEpic` is already set from the cycle that just failed — do not re-derive
        it). This is step 1 of the four-step per-epic validation cycle — `rebase_cascade` →
        `integration_build` → `functional_test` → `integrate_review` — that runs cumulatively through `{currentValidationEpic}` every time an
        epic completes (see [Post-fix / post-epic integration validation] in the project README for
        the full rationale). The goal of this step specifically: make sure every `feat/*/story-*`
        branch up to and including `{currentValidationEpic}` is rebased fresh onto the real upstream
        tip, cascading each branch onto the *newly rebased* version of the branch before it, in stack
        order — exactly the manual cascade-rebase procedure this project used once by hand, now
        automated so the stack never drifts stale across a long multi-epic run.

        1. **Resolve the upstream-of-record.** Use `{rebaseRemote}` from `bmad-env.json` (`upstream`
           if that remote exists in this repo, else `origin` — resolved once in `init`, see
           [Requirements]) and `{defaultBranch}`. Fetch it fresh: `git -C {root} fetch {rebaseRemote}
           {defaultBranch}`. The new base tip is `git -C {root} rev-parse
           {rebaseRemote}/{defaultBranch}`.
        2. **Fast-forward the local `{defaultBranch}` itself — never rebase or rewrite it.**
           `git -C {root} checkout {defaultBranch} && git -C {root} merge --ff-only
           {rebaseRemote}/{defaultBranch}`. Record its pre-merge tip as `old_base` and its new tip
           (after the ff-only merge) as `new_base`.
           - **If the fast-forward fails** (local `{defaultBranch}` has diverged — e.g. commits exist
             on it that aren't in `{rebaseRemote}/{defaultBranch}`), STOP. Do not force, rebase, or
             merge `{defaultBranch}` any other way. A diverged default branch is exactly the class of
             mistake this project hit once before (a manual test-merge landed directly on `main`
             instead of a disposable branch) — it needs a human decision, not an autonomous rewrite
             of the branch everything else stacks on. Set `status = "needs-attention"`, record the
             divergent commits in `state.json`'s `reason`, `phase = "done"`. Update `state.json`. End
             turn.
        3. **Enumerate the stack up to `{currentValidationEpic}`**: `git -C {root} branch -a --list
           'feat/*/story-*'`, sorted by epic number then story number, FILTERED to epic number <=
           `{currentValidationEpic}` — a defect-fix or out-of-order run may already have later
           epics' branches sitting in the repo, but this cycle validates cumulative functionality
           only "up to this point," so branches from a later epic must be excluded here even if they
           exist. If the filtered list is empty, there's nothing to cascade — skip to step 5 with no
           branches processed.
        4. **Cascade-rebase every filtered branch in stack order**, threading each branch's own
           old/new tip into the next:
           - Start with `prev_old = old_base`, `prev_new = new_base` (from step 2).
           - For each branch, in order:
             - Record its current tip: `branch_old = git -C {root} rev-parse <branch>`.
             - `git -C {root} rebase --onto {prev_new} {prev_old} <branch>` — this replays only the
               commits unique to `<branch>` (relative to its own previous parent state, `prev_old`)
               onto the freshly-rebased `prev_new`, exactly like the manual procedure.
             - **If this rebase conflicts**: `git -C {root} rebase --abort`. Do NOT attempt to
               resolve it yourself — per this workflow's established philosophy (see
               `integration_build` below), a rebase conflict here means the stack itself needs a
               human look, not an autonomous resolution. Record the branch and the conflicting file
               list (`git -C {root} diff --name-only --diff-filter=U` before aborting) in
               `state.json`'s `reason`, set `status = "needs-attention"`, `phase = "done"`. Update
               `state.json`. End turn.
             - On success, record its new tip: `branch_new = git -C {root} rev-parse <branch>`. This
               becomes `prev_old = branch_old`, `prev_new = branch_new` for the NEXT branch in the
               stack.
             - Best-effort push the freshly-rebased branch back to `origin` (never to `upstream`):
               `git -C {root} push --force-with-lease origin <branch>`. A push failure here is
               logged in your turn's summary but must NOT fail the run — the rebase itself already
               succeeded locally and every later branch in the cascade still needs processing; a
               human can push it later.
        5. **Record the outcome.** Append a short table (branch, old SHA, new SHA, status) to your
           turn's summary so the final `report` node can surface it. This workflow does not require
           a separate on-disk report for this step (unlike `integrate_review`'s findings doc) since
           there is nothing here for a human to triage when it succeeds — the whole point is that
           it's routine, low-drama maintenance.
        6. Set `phase = "integration_build"`. Update `state.json`. End turn.

        ## phase = "integration_build"  → step 2/4: rebuild the disposable cumulative integration branch
        Rebuilds a fresh, local-only branch containing every story up to and including
        `{currentValidationEpic}` — freshly rebased by the previous `rebase_cascade` step — so the
        next two steps (`functional_test`, `integrate_review`) have one concrete, disposable artifact
        to test and review against.

        1. **Enumerate the stack up to `{currentValidationEpic}`**, same filter as `rebase_cascade`
           step 3: `git -C {root} branch -a --list 'feat/*/story-*'`, sorted by epic number then
           story number, epic number <= `{currentValidationEpic}` only.
           - If empty (shouldn't normally happen since `epicsValidated` guards re-entry, but treat it
             as a harmless no-op rather than erroring): append `{currentValidationEpic}` to
             `epicsValidated`, clear `currentValidationEpic` (`null`), `phase = "select"`. Update
             `state.json`. End turn.
        2. **Resolve the stack's true base**: whichever commit `git -C {root} merge-base` reports
           for the FIRST (lowest epic.story) filtered branch against `{defaultBranch}`.
        3. **Create the branch** — never reuse a name from a previous cycle, and never push it
           anywhere. Compute a fresh suffix now (`date +%Y%m%d-%H%M%S`, or reuse one already
           recorded in `state.json` if this is a RETRY of THIS SAME cycle after a conflict, rather
           than creating a new disposable branch on every retry):
           `git -C {root} checkout -b integration/epic-{currentValidationEpic}-validation-<suffix>
           <that base commit>` — and record `validationBranch =
           "integration/epic-{currentValidationEpic}-validation-<suffix>"` in `state.json`
           immediately, before doing anything else in this phase.
        4. **Merge every filtered branch into it, in sprint order** (lowest epic.story first):
           `git -C {root} merge --no-ff <branch> -m "merge: <branch> into {validationBranch} (epic
           {currentValidationEpic} cumulative validation)"` for each branch in turn.
           - **If any merge conflicts**: `git -C {root} merge --abort`, record the branch and the
             conflicting file list in `state.json`'s `reason`, set `status = "needs-attention"`,
             `phase = "done"`. Do NOT attempt to resolve the conflict yourself — a conflict here means
             the stack itself is no longer cleanly stacked (e.g. a fix commit landed without a
             follow-up rebase of dependent branches), which needs a human decision, not an
             autonomous merge resolution. Update `state.json`. End turn.
           - If every merge is clean (the expected outcome for a properly stacked/rebased set of
             branches, since `rebase_cascade` just ran), continue.
        5. Set `phase = "functional_test"`. Update `state.json`. End turn.

        ## phase = "functional_test"  → step 3/4: generate-if-missing + run cumulative acceptance tests
        A clean antagonistic *read* of the code (the next and final step) is necessary but not
        sufficient — it can still miss a genuine runtime break that only shows up when the code
        actually executes. This phase makes sure every epic's acceptance criteria, from epic 1
        through `{currentValidationEpic}`, has a real, currently-passing, executable
        functional/acceptance test on `{validationBranch}` — not just unit tests written
        story-by-story in isolation, which can each pass individually while the seam between them is
        still broken.

        This phase generates and runs TWO distinct categories of tests, both disposable and living
        only on `{validationBranch}` — never on story branches:
        - **Epic-level acceptance tests**: one per epic in scope, proving that epic's own acceptance
          criteria hold end-to-end.
        - **Project-level acceptance tests**: a smaller, standing suite proving the PRD's overall
          goals/success criteria and any *cross-epic* behavior — i.e. requirements that only make
          sense once two or more epics compose together (e.g. "a span created by the epic 2
          instrumentation is queryable through the epic 4 export path") — which no single epic's own
          acceptance-criteria list would ever call out, and which per-epic tests alone can never
          catch no matter how many epics they individually cover.

        1. **Gather the cumulative acceptance-criteria scope.** Read the epics/acceptance-criteria
           file (resolve its path via `{planningArtifacts}` in `bmad-env.json`) for every epic
           numbered 1 through `{currentValidationEpic}`, and every story file under those epics in
           `{implementationArtifacts}`. ALSO read the full PRD (same `{planningArtifacts}`) for its
           overall goals, success metrics, and any requirement or user journey whose wording spans
           more than one epic — this is the project-level scope, independent of `{currentValidationEpic}`
           only in that it can't be evaluated until at least two epics exist, but otherwise always
           re-derived fresh each cycle from the PRD, not carried forward.
        2. **Inventory existing functional/acceptance-level tests already on `{validationBranch}`** —
           distinct from per-story unit tests: look for integration/e2e-style suites (existing
           `tests/integration/`, `tests/e2e/`, or equivalently-named directories per this project's
           actual conventions; check each story's own File List / dev notes for what test types it
           already added). Separately, look for a project-level/cross-epic suite (e.g.
           `tests/acceptance/`, `tests/project/`, or equivalently-named per this project's actual
           conventions — do not invent a new convention if one already exists). For each epic in
           scope, determine whether its acceptance criteria are actually exercised end-to-end by
           something that runs real code paths together (not mocked away at the seam), not just
           asserted individually per story. Separately, determine whether the PRD's cross-epic
           requirements/user journeys identified in step 1 are covered by an existing project-level
           test.
        3. **For every epic in scope whose acceptance criteria have no such cumulative test**,
           generate one now, directly on `{validationBranch}` (never on any story branch — this is a
           verification artifact of the disposable integration branch, not attributable to one
           story). **Separately, for every PRD-level cross-epic requirement/user journey identified
           in step 1 that has no existing project-level test**, generate one in the project-level
           suite, exercising the real code paths across the epics it spans (not mocked at the seam).
           Both categories follow the same spirit as the `bmad-qa-generate-e2e-tests` skill (use the
           project's existing test framework and patterns; happy path + the acceptance criteria's own
           explicit failure/edge cases; readable, minimal, no over-engineered fixtures) but drive
           scope from the epic's/PRD's actual text, not a free-form feature name — and skip that
           skill's own Step 1 (asking the user what to test) entirely, since this phase runs
           autonomously; decide the scope yourself from the acceptance criteria and PRD.
        4. **Commit the generated tests** on `{validationBranch}` — one commit for epic-level tests
           (subject like `test(epic-{currentValidationEpic}): add cumulative acceptance tests`) and,
           if any were generated, a separate commit for project-level tests (subject like `test:
           add project-level cross-epic acceptance tests`) — this branch is local-only and
           disposable, so these commits never need pushing.
        5. **Run the full functional/acceptance test suite** (existing + newly generated, BOTH
           epic-level and project-level) against `{validationBranch}`, using this project's real
           test command(s) — reuse the same multi-ecosystem discovery the `dev` phase already does
           (JS via `bun`/`npm`/`yarn`/`pnpm`, plus `pip`/`poetry`, `cargo`, `go test`, whichever
           applies) rather than guessing a single command.
        6. **Branch on the result:**
           - **All tests pass**: record a short summary (`functionalTestSummary` — suite(s) run
             (epic-level and project-level called out separately), pass count, any tests newly
             generated this cycle in either category) in `state.json`, `phase = "integrate_review"`
             (the next phase uses this summary as corroborating evidence).
           - **Any test fails (epic-level OR project-level)**: this is direct, executable proof of a
             cross-story or cross-epic break — do NOT treat it as a soft signal or let it pass
             through to the review phase silently, and do NOT attempt to fix it yourself in this
             phase (this phase never edits story code, only generates/runs tests on
             `{validationBranch}`). Record which test(s) failed (and whether epic-level or
             project-level), their full output, and the implicated file(s) in
             `integrationFailureDetail`, set `integrationFailureSource = "functional_test"`, then:
             - `integrationFixRetry < maxIntegrationFixRetries` → `phase = "auto_correct_course"`
               (root-cause it and attempt a real fix — see that phase below — rather than halting
               immediately).
             - `integrationFixRetry >= maxIntegrationFixRetries` → the auto-fix budget is exhausted
               and the break is still present; this is exactly the kind of "significant change"
               `bmad-correct-course` exists to triage by a human. Set `status = "needs-attention"`,
               `phase = "done"`, and record in `reason` which test(s) still fail plus
               "exhausted {maxIntegrationFixRetries} auto-correct-course cycles."
           Update `state.json`. End turn.

        ## phase = "integrate_review"  → step 4/4: antagonistic requirements-driven review
        Reached only after `functional_test` has confirmed every test on `{validationBranch}`
        passes. A per-story review only ever sees that one story's own diff — it cannot catch a gap
        that only exists at the seam BETWEEN stories (e.g. story A adds a processor module but the
        story that's supposed to wire it into the live pipeline never actually does so). Passing
        functional tests prove the happy paths those tests cover actually work; this phase catches
        everything else — acceptance criteria the tests don't happen to exercise, requirements
        documented but not implemented, and code-quality-level cross-story issues — before the run is
        allowed to consider this epic (and everything beneath it) genuinely validated.

        1. **Run one antagonistic, requirements-driven review** of `{validationBranch}`. Prefer
           spawning this as a separate subagent/task (if your runtime exposes a Task-style tool, use
           it) so the review has a clean, unbiased context rather than reusing this cycle's own
           conversation; if no such tool is available, perform the review yourself in this same turn
           instead of skipping it. Either way, the review must:
           - Read the FULL PRD, epics/acceptance-criteria file, architecture document, and feature
             spec (resolve their paths via `{planningArtifacts}`/`{implementationArtifacts}` in
             `bmad-env.json`, not guessed paths) — scoped to epics 1 through
             `{currentValidationEpic}`.
           - Read every story file in `{implementationArtifacts}` for stories in that scope.
           - Take `{functionalTestSummary}` from `state.json` as corroborating evidence (tests
             passing narrows what's already proven; it does NOT excuse skipping the read-level
             review of everything the tests don't cover).
           - Inspect the ACTUAL merged code on `{validationBranch}` — not just story files' claims —
             to verify each acceptance criterion is genuinely satisfied, including criteria that only
             make sense when multiple stories/epics compose together.
           - Be adversarial: assume guilty until proven innocent by the code; do not pad the report
             with trivia.
           - Classify every finding as CRITICAL / HIGH / MEDIUM / LOW with file/line evidence and a
             quote proving the gap, exactly as a `bmad-code-review`-style adversarial pass would, but
             scoped to the WHOLE merged stack (epics 1–`{currentValidationEpic}`) rather than one
             story's diff.
           - Write the findings to `{planningArtifacts}/integration-review-epic-
             {currentValidationEpic}-{date}.md` (or `{implementationArtifacts}/` if
             `planningArtifacts` is unavailable) with a summary table of finding counts by severity.
        2. **Branch on the outcome:**
           - **0 CRITICAL and 0 HIGH findings**: append every epic number from the lowest
             not-yet-validated epic through `{currentValidationEpic}` to `epicsValidated`
             (cumulative validation at epic N inherently covers everything through N, even epics
             that never got their own individual cycle — e.g. a defect-fix run that jumps straight
             to validating the highest epic), clear `currentValidationEpic` / `validationBranch` /
             `functionalTestSummary` (all `null`), `phase = "select"` (resume normal selection —
             which will now either move on to the next epic's own story work, or fall through to
             `status = "complete"` if nothing else is pending).
           - **1+ CRITICAL or 1+ HIGH findings**: record the findings-report path and a one-line
             summary of the CRITICAL/HIGH counts (plus each finding's file/line evidence) in
             `integrationFailureDetail`, set `integrationFailureSource = "integrate_review"`, then:
             - `integrationFixRetry < maxIntegrationFixRetries` → `phase = "auto_correct_course"`
               (classify and, if safe, fix each finding — see that phase below — rather than
               escalating immediately; a cross-story integration gap is only automatically fixable
               when it's an unambiguous implementation-fidelity defect, never a design/scope
               question).
             - `integrationFixRetry >= maxIntegrationFixRetries` → the auto-fix budget is exhausted.
               Set `status = "needs-attention"`, `phase = "done"`, and record in `reason` the
               findings-report path, the CRITICAL/HIGH counts, and "exhausted
               {maxIntegrationFixRetries} auto-correct-course cycles."
           Update `state.json`. End turn.
        3. Leave `{validationBranch}` in place either way (local-only, never pushed) — it is the
           exact artifact the findings report and functional tests were run against, so a human (or
           a follow-up `bmad-correct-course` cycle) can inspect it directly.

        ## phase = "auto_correct_course"  → self-healing loop: root-cause, fix, re-validate
        Entered from `functional_test` (a real test failure) or `integrate_review` (1+ CRITICAL/HIGH
        findings) whenever `integrationFixRetry < maxIntegrationFixRetries`. This mirrors what a
        human runs manually via `bmad-correct-course` when integration validation finds a genuine
        cross-story regression, but scoped to the narrow, mechanical class of defect that's safe to
        fix without a human decision: a stale caller/test that never got updated after a DIFFERENT,
        already-landed story's intentional API/contract change. Anything less clear-cut escalates
        instead of guessing.

        **THE HARD RULE — read this before touching anything**: a fix must NEVER be committed on
        `{validationBranch}` (the disposable integration branch) and NEVER left as an uncommitted
        worktree edit. `{validationBranch}` is rebuilt from scratch every cycle (see
        `integration_build`), so anything fixed only there is silently discarded and the same defect
        would resurface on every future validation run. Every fix MUST be committed and pushed to the
        actual individual story branch (`feat/{epicSlug}/story-*` or equivalent) that owns the
        affected file — the same branch that will eventually be opened as its own PR — exactly as if
        a human had root-caused it and run `bmad-correct-course` by hand.

        1. **Root-cause.** Using `integrationFailureSource` and `integrationFailureDetail`:
           - `"functional_test"`: for each failing test, inspect the actual error (assertion,
             exception, signature mismatch) and use `git -C {root} log -p` / `git -C {root} blame` on
             both the failing test file and the production file(s) it exercises to find the commit
             that changed the contract. Identify which side is authoritative (the commit that
             intentionally changed an API/behavior, on the story that owns that production file) and
             which side is stale (a test or caller on a DIFFERENT story that was never updated to
             match).
           - `"integrate_review"`: read the findings report at the path recorded in
             `integrationFailureDetail`. For each CRITICAL/HIGH finding, use its own file/line
             evidence to identify the implicated file(s), then `git -C {root} log` / `git blame`
             those files to find which story last touched the defective content.
        2. **Classify every root-caused issue, one at a time:**
           - **Safe to auto-fix** — an unambiguous implementation-fidelity defect against an
             already-approved acceptance criterion or API contract: a stale caller/test not updated
             after a later, intentional, already-landed change; a missing wire-up between two
             already-correct pieces; an assertion checking the wrong thing. This is the "Minor:
             Direct Adjustment" tier from `bmad-correct-course`'s own classification.
           - **NOT safe to auto-fix** — anything involving ambiguous design intent, conflicting
             acceptance criteria, a gap implying a missing story/epic, or genuine uncertainty about
             which side is "correct." Do not guess and do not touch code. Set `status =
             "needs-attention"`, `phase = "done"`, and record in `reason` exactly which finding(s)
             need a human decision and why they don't qualify as a safe direct fix. End turn
             immediately — do not proceed to step 3 for ANY finding this cycle if even one finding
             in the batch is unsafe (a partial autonomous fix on top of an unresolved ambiguous one
             risks compounding the mess).
        3. **For every safe fix, in stack order (lowest epic.story first):**
           a. Determine the owning branch: enumerate the stack (`git -C {root} branch -a --list
              'feat/{epicSlug}/story-*'` or equivalent, in stack order) and find the first/owning
              branch whose tree already contains the current (defective) version of the affected
              file — typically the story identified by `git log`/`git blame` in step 1.
           b. Check out that branch. If it's locked by another worktree (e.g. a concurrently-running
              Archon session — discover via `git -C {root} worktree list`), perform the fix directly
              in that other worktree's path instead of failing.
           c. Resync before editing: `git -C {root} reset --hard origin/<owning-branch>` (never trust
              a possibly-stale local checkout).
           d. Apply the MINIMAL correct fix — match the pattern the authoritative/already-landed
              commit established (see step 1), don't invent a new one.
           e. Run just the affected test(s)/file's own tests to confirm green before committing.
           f. Commit with subject `fix(correct-course): <short description> (epic
              {currentValidationEpic} integration review)` and a body naming the specific
              test/finding and why this branch is the correct owner.
           g. Push: `git -C {root} push --force-with-lease origin <owning-branch>` (retry once on a
              transient network failure; if it still fails after retry, record it in
              `integrationFixLog` and `state.json`'s `reason` but do not abort the whole phase over
              one push — flag it for the final report the same way `rebase_cascade` does for its own
              transient failures).
           h. If another, higher-in-the-stack branch also needs a fix this cycle, cascade-rebase
              every branch between the one just fixed and that next one onto the new tip first
              (same `git rebase --onto` mechanics as `rebase_cascade`), so the next fix always lands
              on top of a branch that already contains this cycle's prior fixes and nothing is
              edited twice.
        4. **Record the cycle.** Append one entry to `integrationFixLog`: `{ epic:
           currentValidationEpic, retry: integrationFixRetry, fixes: [ { branch, commitSha,
           summary } ] }`.
        5. **Reset for re-validation.** Increment `integrationFixRetry`. Clear
           `integrationFailureSource` / `integrationFailureDetail` (`null`), clear
           `validationBranch` / `functionalTestSummary` (`null` — both are stale and about to be
           rebuilt from the fixed stack). Set `phase = "rebase_cascade"` — this re-runs the FULL
           four-step cycle from scratch: `rebase_cascade` re-freshens and cascades every branch in
           scope (including ones this cycle didn't touch, since their upstream base may have moved),
           `integration_build` rebuilds a brand-new disposable branch with a fresh timestamp suffix,
           and `functional_test`/`integrate_review` re-verify against the corrected code — proving
           the fix is real, not just plausible.
        6. Update `state.json`. End turn.

        ---

        ## COMPLETION
        After updating `state.json`, check `status`:
        - `status == "complete"` → output exactly: <promise>BMAD_RUN_COMPLETE</promise>
        - `status == "failed"`   → output exactly: <promise>BMAD_RUN_COMPLETE</promise>
        - `status == "needs-attention"` → output exactly: <promise>BMAD_RUN_COMPLETE</promise>
          (all target stories were implemented and reviewed clean, but the final cross-story
          integration validation still found a problem after either a finding was classified
          unsafe to auto-fix, or `maxIntegrationFixRetries` auto-correct-course cycles were
          exhausted — this is a distinct terminal state from `failed`: the per-story work genuinely
          succeeded, but a human must now decide how to address the integration-level findings,
          e.g. via `bmad-correct-course`.)
        - otherwise → do NOT output any completion signal. Just end your turn; the loop continues.

  # ─── Phase 2: Report ─────────────────────────────────────────────────
  - id: report
    depends_on: [build-loop]
    trigger_rule: all_done
    context: fresh
    model: haiku  # cheap final summary
    prompt: |
      Generate a concise run report for this BMAD implementation run.

      Read:
      1. `$ARTIFACTS_DIR/state.json` — final status (`complete`/`failed`), completedStories, completedEpics, reason, `stackedBranching`, `epicSlug`, `integrationFixRetry`, `integrationFixLog`.
      2. `$ARTIFACTS_DIR/bmad-env.json` — sprint-status path, and `mainRoot` / `inWorktree` / `workBranch` / `baseBranch` / `stackedBranching` / `ghAvailable`.
      3. The sprint-status file (from bmad-env.json) — final per-story status.
      4. `git -C <root> log --oneline -30` — the commits this run produced (root = the worktree).

      Report:
      ### Outcome
      - Final status, and (if `failed` or `needs-attention`) the escalation reason verbatim.
      - If `status == "needs-attention"`: call this out prominently — every targeted story was
        implemented and passed its own code review, but the final cross-story integration review
        (merging the full current stack onto a disposable `integration/review-*` branch) found
        CRITICAL/HIGH findings or a functional test failure that could not be fully auto-resolved.
        Surface the findings-report path from `reason` and note that a human should review it and
        likely run `bmad-correct-course` next, the same way a manual antagonistic review would be
        handled.
      ### Auto-correct-course cycles
      - If `integrationFixLog` is non-empty: for each cycle, list the epic, retry number, and every
        `{ branch, commitSha, summary }` fix it applied — call out explicitly that each fix landed
        on its own individual story branch (never the disposable integration branch) and was
        cascaded forward before re-validation re-ran. State the final `integrationFixRetry` count
        against `maxIntegrationFixRetries` so it's clear whether the loop resolved things itself or
        ran out of budget.
      - If empty/absent: state plainly that integration validation passed clean on the first attempt
        with no auto-fix cycles needed (or that stacked-branching mode wasn't in use).
      ### Stories
      - Table of each targeted story: final sprint-status, and whether it was committed this run.
      ### Epics & Retrospectives
      - Which epics completed and which had a retrospective run.
      ### Next steps
      <check if="stackedBranching is true (from bmad-env.json), instead of the single-worktree-branch section below">
      - This run used the repo's stacked-branch-per-story convention — no single `{workBranch}` holds
        the work. Find each story's own branch and PR:
          # list this epic's story branches (each one a separate, already-pushed stack rung):
          `git -C <root> branch -a --list 'feat/{epicSlug}/story-*'`
          # if gh is available, list the PRs actually opened this run:
          `gh pr list --repo <owner>/<repo> --head <each-story-branch> --json number,url,baseRefName`
        List each completed story's branch name, its base (the branch it stacked on), and its PR
        URL/number if one exists (or "not opened — <reason>" if `ghAvailable` was false or PR
        creation failed and was only logged). Note explicitly that these branches were pushed
        directly to `origin` from the Archon worktree — nothing further to merge/integrate through
        the worktree itself; the PRs are the integration path (review + merge each rung of the stack
        in order, oldest story first). Still mention worktree teardown once all its PRs are merged:
          `archon complete {workBranch}` (`--force` only if you intend to discard rather than keep
          the now-merged branches around for reference).
      </check>
      <check if="stackedBranching is false/absent — the ORIGINAL single-branch behavior">
      - If `inWorktree` is true: this run happened in an isolated Archon worktree at `{root}`, on branch
        `{workBranch}`. Your live checkout was never touched (still on `{baseBranch}`), and Archon does
        NOT auto-merge or auto-remove the worktree — it persists until you integrate and tear it down.
        Give these exact commands:
          # 1. Review what landed (branch refs are shared across worktrees):
          `git -C {mainRoot} log --oneline {baseBranch}..{workBranch}`
          # 2. Integrate — EITHER merge locally:
          `git -C {mainRoot} merge --no-ff {workBranch}`
          #    OR push the branch and open a PR:
          `git -C {root} push -u origin {workBranch}`
          # 3. Tear down the worktree + delete the branch once it's merged/pushed
          #    (`archon complete` refuses on unmerged/unpushed/uncommitted work unless --force):
          `archon complete {workBranch}`
        To resume more stories in the SAME worktree (BMAD inputs already hydrated there):
          `archon continue {workBranch} --workflow archon-bmad-story-automator "<more stories>"`
        To discard the run entirely: `archon complete {workBranch} --force` (removes worktree + branch),
        or `archon isolation cleanup --merged` to bulk-clean already-merged runs later.
      - If `inWorktree` is false (ran with `--no-worktree`): commits landed on `{baseBranch}` in your
        live checkout directly — no merge or cleanup step needed.
      </check>
      - Any stories left `in-progress` or `failed` that need a human.

      Write the report to `$ARTIFACTS_DIR/report.md` AND output it directly so the user sees it.
    allowed_tools: [Read, Bash, Glob, Grep, Write]
